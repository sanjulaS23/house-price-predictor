<!DOCTYPE html>
<html lang="en">
<head>

 

    <meta charset="UTF-8">
    <title>AI House Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       <style>
    body {
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .card {
        width: 100%;
        max-width: 900px !important; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
    }
</style>

</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
            <h2 class="text-primary mb-4 text-center">🏠 House Price Predictor</h2>
            
            <form id="predictForm">
                <div class="mb-3">
                    <label>Square Footage (GrLivArea):</label>
                    <input type="number" name="area" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Overall Quality (1-10):</label>
                    <input type="number" name="qual" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Neighborhood:</label>
                        <select name="neighborhood" class="form-control">
                            {% for n in neighborhoods %}<option value="{{n}}">{{n}}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>House Style:</label>
                        <select name="housestyle" class="form-control">
                            {% for h in housestyles %}<option value="{{h}}">{{h}}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Predict Price Now</button>
            </form>

            <div id="loading" class="text-center mt-3 d-none">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Predicting...</p>
            </div>

            <div id="result-box" class="mt-4 p-3 bg-success text-white rounded text-center d-none">
                <h4>Estimated Price: <span id="price-display"></span></h4>
            </div>

            <div class="mt-5">
                <h5>Prediction History</h5>
                <table class="table table-striped" id="historyTable">
                    <thead>
                        <tr>
                            <th>Area</th>
                            <th>Quality</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Show loading spinner
            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('result-box').classList.add('d-none');
            
            const formData = new FormData(e.target);
            const response = await fetch('/predict', { method: 'POST', body: formData });
            const result = await response.json();
            
            // Hide spinner and show result
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('price-display').innerText = result.price;
            document.getElementById('result-box').classList.remove('d-none');
            
            // Add to history table
            let row = `<tr>
                        <td>${formData.get('area')}</td>
                        <td>${formData.get('qual')}</td>
                        <td>${result.price}</td>
                       </tr>`;
            document.querySelector('#historyTable tbody').innerHTML += row;
        };
    </script>
</body>
</html>
